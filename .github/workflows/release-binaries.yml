name: Release binaries

on:
  push:
    tags:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os: macos
            arch: x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            os: macos
            arch: arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
            arch: x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          archive="meterm-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          cp "target/${{ matrix.target }}/release/meterm" dist/meterm
          chmod 755 dist/meterm
          tar -czf "dist/${archive}" -C dist meterm
          rm dist/meterm

      - name: Package macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p pkgroot/usr/local/bin dist
          package="meterm-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.pkg"
          cp "target/${{ matrix.target }}/release/meterm" pkgroot/usr/local/bin/meterm
          chmod 755 pkgroot/usr/local/bin/meterm
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          pkgbuild \
            --root pkgroot \
            --identifier com.emidiomorgia.meterm \
            --version "${version}" \
            --install-location / \
            "dist/${package}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/meterm.exe" "dist/meterm-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.exe"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: meterm-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download target artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: meterm-${{ github.ref_name }}-*
          path: dist
          merge-multiple: true

      - name: Publish binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.pkg
            dist/*.exe
          fail_on_unmatched_files: true
